project:
  name: fair_ad_raw
  raw_dir: data
  processed_dir: data/processed
  results_dir: results

reproducibility:
  master_seed: 2026
  seeds: [42, 123, 456, 789, 1011, 2026, 31415, 27182, 16180, 14142]

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  stratify: true
  train_normal_only: true

ad_setting:
  anomaly_label: 1
  normal_label: 0
  threshold_selection: validation_f1
  score_convention: higher_score_more_anomalous

preprocess:
  numerical_imputer: median
  categorical_imputer: most_frequent
  scaler: standard
  encoder: onehot
  onehot_handle_unknown: ignore
  drop_sensitive_from_features: true

datasets:
  adult:
    raw_files:
      train: data/adult.data
      test: data/adult.test
    processed_dir: data/processed/adult
    label_col: income
    anomaly_value: ">50K"
    sensitive: [sex, race]
    default_sensitive: sex
    description: Adult Census Income dataset; anomaly label is high income class.

  credit_default:
    raw_files:
      data: "data/default of credit card clients.xls"
    processed_dir: data/processed/credit_default
    label_col: default_payment_next_month
    anomaly_value: 1
    sensitive: [sex, age]
    default_sensitive: sex
    description: Credit Default dataset; anomaly label is default payment next month.

models:
  classical: [IsolationForest, LOF, OCSVM]
  deep: [AutoEncoder, DeepSVDD]

threshold:
  percentiles_start: 70
  percentiles_stop: 99.5
  percentiles_num: 240

outputs:
  d1_problem_statement: D1_Problem_Statement_RQs_Hypotheses.md
  d2_decision_log: D2_Decision_Log.md
  d5_metrics_definition: D5_Metrics_Definition_Table.md
  baseline_results: results/all_results.csv
  baseline_summary: results/summary.csv
  score_outputs: results/score_outputs.csv
  figures_dir: results/figures
  d8_dir: results/d8

lof_tuning:
  credit_default:
    n_neighbors_grid: [5, 10, 20, 35, 50, 75, 100, 150, 200, 300, 500, 750, 1000]
    selection_metric: pr_auc
    selected_n_neighbors: 1000
    selection_split: validation
